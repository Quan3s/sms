<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Z-Chat Mobile</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="menuCanvas"></canvas>

    <div id="auth-box" class="box">
        <h2>Đăng nhập Hệ thống</h2>
        <input type="text" id="username" placeholder="@ID Đăng nhập">
        <input type="password" id="password" placeholder="Mật khẩu (8-15 số)">
        <button onclick="login()">Đăng nhập</button>
        <button class="btn-outline" onclick="showRegister()">Đăng ký mới</button>
    </div>

    <div id="reg-box" class="box" style="display: none;">
        <h2>Tạo tài khoản</h2>
        <input type="text" id="reg-username" placeholder="@ID Đăng nhập (Chữ/Số liền nhau)">
        <input type="text" id="reg-display" placeholder="Tên hiển thị (VD: Nguyễn Văn A)">
        <input type="password" id="reg-password" placeholder="Mật khẩu (8-15 số)">
        <button onclick="register()">Xác nhận Đăng ký</button>
        <button class="btn-outline" onclick="showLogin()">Quay lại</button>
    </div>

    <div id="app-container" style="display: none;">
        
        <div id="tab-friends" class="tab-content active">
            <div class="header">
                <h2>Tin nhắn & Bạn bè</h2>
                <button class="btn-small" onclick="createGroup()">+ Tạo Nhóm</button>
            </div>
            <div id="friend-list">
                <p style="color:#888; text-align:center; margin-top:20px;">Dùng Tab Tìm kiếm để tìm bạn bè.</p>
            </div>
        </div>

        <div id="tab-search" class="tab-content">
            <div class="header"><h2>Tìm ID Số / @ID</h2></div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Nhập để tìm...">
                <button onclick="searchUser()">Tìm</button>
            </div>
            <div id="search-results"></div>
        </div>

        <div id="tab-settings" class="tab-content">
            <div class="header"><h2>Cài đặt Tài khoản</h2></div>
            <div class="settings-form">
                <div class="info-card">
                    <p>Tên hiển thị: <span id="my-name" style="color:#00ffcc; font-weight:bold;"></span></p>
                    <p>ID Số (Dùng để kết bạn): <span id="my-num-id" style="color:#ff3366; font-size:20px; font-weight:bold;"></span></p>
                </div>
                <hr style="border-color:#333; margin:15px 0;">
                <input type="text" id="newName" placeholder="Đổi Tên hiển thị mới">
                <input type="password" id="newPass" placeholder="Đổi Mật khẩu mới (Tùy chọn)">
                <button onclick="updateProfile()">Lưu thay đổi</button>
                <button class="btn-danger" onclick="logout()">Đăng xuất</button>
            </div>
        </div>

        <nav class="bottom-nav">
            <div class="nav-item active" onclick="switchTab('friends', this)">💬 Bạn bè</div>
            <div class="nav-item" onclick="switchTab('search', this)">🔍 Tìm kiếm</div>
            <div class="nav-item" onclick="switchTab('settings', this)">⚙️ Cài đặt</div>
        </nav>
    </div>

    <script src="script.js"></script>
</body>
</html>
