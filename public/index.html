<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Chat Box</title>
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <canvas id="menuCanvas"></canvas>
    
    <div id="chat-container">
        <div class="settings-header">
            <h3>Cài đặt định danh</h3>
            <div class="input-group">
                <input type="text" id="userId" placeholder="Nhập @ID của bạn...">
                <button id="btn-save-id">Lưu ID</button>
            </div>
        </div>
        
        <div class="chat-area">
            <div id="messages"></div>
        </div>

        <div class="action-area">
            <button id="btn-plus" title="Đính kèm tệp">+</button>
            <input type="file" id="file-input" hidden>
            
            <input type="text" id="msg-input" placeholder="Nhập tin nhắn (hỗ trợ ký tự đặc biệt)...">
            
            <button id="btn-like">👍</button>
            <button id="btn-send">Gửi</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
